# Pre-commit hooks for replicate-mcp-agents
# Updated: Sprint S5 — Hardening (added detect-secrets, bandit, standard hooks)
#
# Install:  pre-commit install
# Run all:  pre-commit run --all-files

repos:
  # ---------------------------------------------------------------------------
  # Ruff — fast linter + formatter
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff (format)
        types_or: [python, pyi]

  # ---------------------------------------------------------------------------
  # Mypy — static type checking
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (type check)
        args: [--ignore-missing-imports]
        additional_dependencies:
          - pydantic
          - types-PyYAML
          - anyio
        files: ^src/

  # ---------------------------------------------------------------------------
  # detect-secrets — prevent accidental credential commits (Sprint S5)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (credential scan)
        args:
          - --exclude-files
          - poetry\.lock
          - --exclude-files
          - \.github/workflows/.*\.yml

  # ---------------------------------------------------------------------------
  # Bandit — Python SAST (Sprint S5)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: bandit (SAST)
        args:
          - -r
          - src/
          - --severity-level
          - medium
          - --confidence-level
          - medium
          - --exclude
          - src/replicate_mcp/dsl.py
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Standard hooks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements
      - id: no-commit-to-branch
        args: [--branch, main]